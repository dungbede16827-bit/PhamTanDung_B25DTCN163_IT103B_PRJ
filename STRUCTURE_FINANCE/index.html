<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structure Finance</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <header class="topbar">
        <div class="home">
            <div class="logo">📒 Tài Chính Cá Nhân K24_Rikkei</div>
        <div class="account">
            <p>Tài Khoản <img src="../assets/images/Vector.png" alt="Account"></p>
        </div>
        </div>
    </header>

    <div class="sidebar">

    <a href="" class="menu active">
        <span class="icon"><img src="../assets/images/Vector (1).png" alt="" /></span>
        Information
    </a>

    <a href="" class="menu">
        <span class="icon"><img src="../assets/images/Vector (2).png" alt="" /></span>
        Category
    </a>

    <a href="" class="menu">
        <span class="icon"><img src="../assets/images/Vector (3).png" alt="" /></span>
        History
    </a>

</div>

    <section class="banner">
        <h2>🎯 Kiểm soát chi tiêu thông minh</h2>
        <p>Theo dõi ngân sách và thu chi hàng tháng dễ dàng</p>
    </section>

    <div class="container">

        <h2 class="title">📊 Quản Lý Tài Chính Cá Nhân</h2>
        <br>

        <div class="card center">
            <h3>Số tiền còn lại</h3>
            <p class="money">0 VND</p>
        </div>

        <div class="card">
            <label>📅 Chọn tháng:</label>
            <input type="month">
        </div>

        <div class="card">
            <label>Ngân sách tháng:</label>
            <input type="number" placeholder="VD: 5000000">
            <button class="btn blue">Lưu</button>
        </div>
    </div>    
    <div class="personal-info">
    <h3>Quản Lý Thông Tin cá nhân</h3>
    
    <div class="form-row">
        <div class="form-group is-success">
            <label>Name <span class="required">*</span></label>
            <input type="text" value="Nguyen Van A">
        </div>

        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" value="nguyenvana@gmail.com">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Phone <span class="required">*</span></label>
            <input type="text" value="0987654321">
        </div>

        <div class="form-group">
            <label>Gender <span class="required">*</span></label>
            <input type="text" value="Male">
        </div>
    </div>

    <div class="button-group">
        <button class="btn-outline">Change Information</button>
        <button class="btn-outline">Change Password</button>
    </div>
</div>    
    <footer>
        <div>© 2026 Quản lý Tài Chính Cá Nhân - by Tan Dung</div>
    </footer>

</body>

</html>
