<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script>
        if (localStorage.getItem("currentUser")) {
            window.location.replace("../index.html");
        }
    </script>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <img src="../assets/images/2ac775bd5067aeac50620b4071349ace249dc22c.png" alt="" class="bg">

    <div class="login">
        <div class="title">
            <h2> <img src="../assets/images/Heading 2 → 🔐 Đăng nhập.svg" alt=""></h2>
            <p class="success" id="success">Login Successfully</p>
        </div>
        <div class="input">
            <form id="loginForm">
            <div class="form-group">
                <input type="email" placeholder="email ..." required id="email">
                <p class="err" id="email-err">Please enter your email ...</p>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password ..." required id="password">
                <p class="err" id="password-err">Please enter your password ...</p>
            </div>
            <button type="submit" id="login-btn" onclick="handle(event)">Sign In</button>
            <p>You don’t have account?  <a href="register.html">Sign Up Now</a></p>
        </form>
        </div>
        
    </div>
</body>
<script src="../js/login.js"></script>
</html>
