<html lang="en">

</head>
<body>
    <img src="../assets/images/2ac775bd5067aeac50620b4071349ace249dc22c.png" alt="" class="bg">

        </div>

                <input type="password" placeholder="Password ..." required>

            </div>
            <button type="submit">Sign In</button>
            <p>You don’t have account?  <a href="register.html">Sign Up Now</a></p>
        </form>
        </div>
        
    </div>
</body>
